<title>Radiohead World Tour 2027</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#000,#181818);
color:white;
text-align:center;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
background:url("https://images.unsplash.com/photo-1501386761578-eac5c94b800a?w=1400") center/cover;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.65);
}

.hero *{
position:relative;
z-index:1;
}

h1{
font-size:55px;
letter-spacing:5px;
margin-bottom:15px;
}

p{
font-size:18px;
color:#ddd;
}

button{
margin-top:30px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:40px;
background:white;
color:black;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

.section{
padding:60px 20px;
}

.cards{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.card{
background:#222;
padding:20px;
border-radius:15px;
width:280px;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card h2{
margin-bottom:10px;
}

.countdown{
font-size:28px;
margin-top:20px;
font-weight:bold;
}

footer{
padding:30px;
color:#888;
}
</style>

</head>
